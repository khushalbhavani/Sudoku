<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સુડોકુ Pro</title>

<style>
:root{
  --bg:#0d0d12;
  --panel:#181822;
  --cell:#20202c;
  --line:#34344b;
  --gold:#d7b46a;
  --green:#53e3b0;
  --red:#ff4d67;
  --blue:#8db8ff;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  min-height:100vh;
  padding:20px 10px 40px;
}

.container{
  width:100%;
  max-width:620px;
}

.title{
  text-align:center;
  font-size:38px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:15px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--panel);
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

#timer{
  font-size:28px;
  font-weight:900;
  color:var(--gold);
}

#status{
  font-size:14px;
}

.board-wrap{
  background:var(--panel);
  padding:14px;
  border-radius:18px;
}

#board{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  border:3px solid var(--gold);
  border-radius:8px;
  overflow:hidden;
}

.cell{
  position:relative;
  aspect-ratio:1;
  border:1px solid var(--line);
  background:var(--cell);
}

.cell:nth-child(3n){
  border-right:3px solid #515172;
}

.cell:nth-child(9n){
  border-right:1px solid var(--line);
}

.cell:nth-child(n+19):nth-child(-n+27),
.cell:nth-child(n+46):nth-child(-n+54){
  border-bottom:3px solid #515172;
}

.cell input{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  text-align:center;
  font-size:clamp(20px,4vw,32px);
  font-weight:900;
  caret-color:var(--gold);
}

/* MANUAL */
.manual{
  color:white!important;
  font-weight:900!important;
}

/* SOLVED */
.solved{
  color:var(--green)!important;
  font-weight:700!important;
}

/* WRONG */
.error{
  color:var(--red)!important;
  animation:shake .18s linear infinite;
}

@keyframes shake{
  0%{transform:translateX(0px);}
  25%{transform:translateX(-1px);}
  50%{transform:translateX(1px);}
  75%{transform:translateX(-1px);}
  100%{transform:translateX(0px);}
}

/* NOTES */
.notes{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  padding:2px;
  pointer-events:none;
}

.note{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
  color:var(--blue);
  font-weight:700;
}

.controls{
  margin-top:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.second{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

button{
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

#startBtn{
  background:#5b66ff;
  color:white;
}

#solveBtn{
  background:#4ed39b;
  color:black;
}

#noteBtn{
  background:#2a2a38;
  color:white;
}

#autoNoteBtn{
  background:#2a2a38;
  color:#9ed1ff;
}

#clearBtn{
  background:#2a2a38;
  color:white;
}

.active{
  outline:2px solid #8db8ff;
}

.numpad{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:5px;
}

.numpad button{
  background:#252535;
  color:white;
}

.info{
  text-align:center;
  color:#9c9cb1;
  margin-top:12px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">સુડોકુ Pro</div>

<div class="topbar">
  <div id="timer">00:00</div>
  <div id="status">સુડોકુ ઉમેરો</div>
</div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div class="controls">
  <button id="startBtn">▶ શરૂ</button>
  <button id="solveBtn">⚡ ઓટો સોલ્વ</button>
</div>

<div class="second">
  <button id="noteBtn">✏️ નોટ</button>
  <button id="autoNoteBtn">🔢 ઓટો નોટ</button>
  <button id="clearBtn">🗑 ક્લિયર</button>
</div>

<div class="numpad" id="numpad"></div>

<div class="info">
સફેદ = મેન્યુઅલ | લીલો = સાચો | લાલ = ખોટો
</div>

</div>

<script>

const board=document.getElementById("board");

let grid=Array(81).fill(0);
let solution=Array(81).fill(0);

let notes=Array.from({length:81},()=>[]);

let selected=-1;
let noteMode=false;
let started=false;

let timer=null;
let sec=0;

function setStatus(t){
  document.getElementById("status").innerText=t;
}

function formatTime(s){
  let m=Math.floor(s/60);
  let r=s%60;
  return String(m).padStart(2,"0")+":"+String(r).padStart(2,"0");
}

function startTimer(){

  if(timer)return;

  timer=setInterval(()=>{
    sec++;
    document.getElementById("timer").innerText=formatTime(sec);
  },1000);
}

function stopTimer(){
  clearInterval(timer);
  timer=null;
}

const cells=[];

/* CREATE BOARD */

for(let i=0;i<81;i++){

  const cell=document.createElement("div");
  cell.className="cell";

  const notesDiv=document.createElement("div");
  notesDiv.className="notes";

  for(let n=1;n<=9;n++){

    const note=document.createElement("div");
    note.className="note";
    notesDiv.appendChild(note);
  }

  const input=document.createElement("input");

  input.type="tel";
  input.inputMode="numeric";
  input.pattern="[1-9]*";

  input.addEventListener("focus",()=>{
    selected=i;
  });

  input.addEventListener("input",(e)=>{

    let val=e.target.value.replace(/[^1-9]/g,'');

    if(val.length>1) val=val[0];

    e.target.value=val;

    if(val===""){

      grid[i]=0;

      input.classList.remove("manual","solved","error");

      clearNotes(i);

      return;
    }

    let num=parseInt(val);

    /* NOTE MODE */

    if(noteMode){

      e.target.value="";

      toggleNote(i,num);

      return;
    }

    /* NORMAL */

    grid[i]=num;

    input.classList.remove("solved","error");

    input.classList.add("manual");

    /* ONLY REMOVE RELATED NOTES */
    removePeerNotes(i,num);

    if(started){

      checkAnswer(i);
    }
  });

  cell.appendChild(notesDiv);
  cell.appendChild(input);

  board.appendChild(cell);

  cells.push({
    input,
    notesDiv
  });
}

/* NUMPAD */

const numpad=document.getElementById("numpad");

for(let n=1;n<=9;n++){

  const btn=document.createElement("button");

  btn.innerText=n;

  btn.onclick=()=>{

    if(selected<0)return;

    const inp=cells[selected].input;

    // જો ઇનપુટ રીડ ઓન્લી (લોક) હોય તો નમપેડથી પણ ચેન્જ નહિ થાય
    if(inp.readOnly) return; 

    inp.focus();

    inp.value=n;

    inp.dispatchEvent(new Event("input"));
  };

  numpad.appendChild(btn);
}

/* NOTE MODE */

document.getElementById("noteBtn").onclick=()=>{

  noteMode=!noteMode;

  document.getElementById("noteBtn")
  .classList.toggle("active");

  setStatus(noteMode?"નોટ મોડ ચાલુ":"નોટ મોડ બંધ");
};

function toggleNote(index,num){

  if(grid[index])return;

  let arr=notes[index];

  if(arr.includes(num)){

    arr.splice(arr.indexOf(num),1);

  }else{

    arr.push(num);
  }

  renderNotes(index);
}

/* AUTO NOTE */

document.getElementById("autoNoteBtn").onclick=()=>{

  generateAutoNotes();

  setStatus("ઓટો નોટ ઉમેરાઈ");
};

function generateAutoNotes(){

  for(let i=0;i<81;i++){

    if(grid[i]){

      clearNotes(i);

      continue;
    }

    notes[i]=getCandidates(i);

    renderNotes(i);
  }
}

/* IMPORTANT FIX */
/* AUTO NOTE ONLY WHEN BUTTON CLICK */
/* NOT DURING NORMAL INPUT */

function removePeerNotes(index,num){

  clearNotes(index);

  const row=Math.floor(index/9);
  const col=index%9;

  for(let i=0;i<9;i++){

    removeSingle(row*9+i,num);

    removeSingle(i*9+col,num);
  }

  const br=Math.floor(row/3)*3;
  const bc=Math.floor(col/3)*3;

  for(let r=br;r<br+3;r++){
    for(let c=bc;c<bc+3;c++){

      removeSingle(r*9+c,num);
    }
  }
}

function removeSingle(index,num){

  if(notes[index].includes(num)){

    notes[index]=notes[index].filter(x=>x!==num);

    renderNotes(index);
  }
}

function renderNotes(index){

  const spans=cells[index].notesDiv.children;

  for(let i=1;i<=9;i++){

    spans[i-1].innerText=
      notes[index].includes(i)?i:"";
  }
}

function clearNotes(index){

  notes[index]=[];

  renderNotes(index);
}

/* CANDIDATES */

function getCandidates(index){

  if(grid[index]) return [];

  const row=Math.floor(index/9);
  const col=index%9;

  const used=new Set();

  for(let i=0;i<9;i++){

    if(grid[row*9+i])
      used.add(grid[row*9+i]);

    if(grid[i*9+col])
      used.add(grid[i*9+col]);
  }

  const br=Math.floor(row/3)*3;
  const bc=Math.floor(col/3)*3;

  for(let r=br;r<br+3;r++){
    for(let c=bc;c<bc+3;c++){

      let v=grid[r*9+c];

      if(v) used.add(v);
    }
  }

  const arr=[];

  for(let n=1;n<=9;n++){

    if(!used.has(n))
      arr.push(n);
  }

  return arr;
}

/* SOLVER */

function valid(board,pos,num){

  const row=Math.floor(pos/9);
  const col=pos%9;

  for(let i=0;i<9;i++){

    if(board[row*9+i]===num) return false;

    if(board[i*9+col]===num) return false;
  }

  const br=Math.floor(row/3)*3;
  const bc=Math.floor(col/3)*3;

  for(let r=br;r<br+3;r++){
    for(let c=bc;c<bc+3;c++){

      if(board[r*9+c]===num)
        return false;
    }
  }

  return true;
}

function solve(board){

  for(let i=0;i<81;i++){

    if(board[i]===0){

      for(let n=1;n<=9;n++){

        if(valid(board,i,n)){

          board[i]=n;

          if(solve(board))
            return true;

          board[i]=0;
        }
      }

      return false;
    }
  }

  return true;
}

/* START */

document.getElementById("startBtn").onclick=()=>{

  let temp=[...grid];

  if(!solve(temp)){

    setStatus("ખોટું સુડોકુ");

    return;
  }

  solution=[...temp];

  started=true;

  // શરૂ કર્યા પહેલા લખેલા નંબર્સને લોક (readOnly) કરવા માટે
  for(let i=0;i<81;i++){
    if(grid[i] !== 0){
      cells[i].input.readOnly = true;
    }
  }

  startTimer();

  setStatus("સોલ્વ શરૂ કરો");
};

/* CHECK */

function checkAnswer(index){

  const inp=cells[index].input;

  if(grid[index]!==solution[index]){

    inp.classList.add("error");

    if(navigator.vibrate){

      navigator.vibrate(100);
    }

  }else{

    inp.classList.remove("error");

    inp.classList.remove("manual");

    inp.classList.add("solved");

    checkComplete();
  }
}

function checkComplete(){

  for(let i=0;i<81;i++){

    if(grid[i]!==solution[i]) return;
  }

  stopTimer();

  setStatus("🎉 સુડોકુ પૂર્ણ!");
}

/* AUTO SOLVE */

document.getElementById("solveBtn").onclick=()=>{

  let temp=[...grid];

  if(!solve(temp)){

    setStatus("સોલ્વ શક્ય નથી");

    return;
  }

  solution=[...temp];

  for(let i=0;i<81;i++){

    grid[i]=solution[i];

    cells[i].input.value=solution[i];

    cells[i].input.classList.remove("manual","error");

    cells[i].input.classList.add("solved");

    clearNotes(i);
  }

  stopTimer();

  setStatus("સુડોકુ સોલ્વ થઈ ગયું");
};

/* CLEAR */

document.getElementById("clearBtn").onclick=()=>{

  stopTimer();

  sec=0;

  document.getElementById("timer").innerText="00:00";

  grid=Array(81).fill(0);

  solution=Array(81).fill(0);

  notes=Array.from({length:81},()=>[]);

  started=false;

  for(let i=0;i<81;i++){

    cells[i].input.value="";

    cells[i].input.className="";

    // ક્લિયર કર્યા પછી બોક્સને ફરીથી એડિટ કરી શકાય તે માટે
    cells[i].input.readOnly = false; 

    clearNotes(i);
  }

  setStatus("સુડોકુ ક્લિયર");
};

</script>

</body>
</html>
